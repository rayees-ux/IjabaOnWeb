<script>
    // Ensure all inputs have placeholder " " for floating label detection, but content unchanged
    // Actually we already added placeholder=" " in HTML, but to be safe and preserve content we keep as is.
    // No content modifications: labels, texts, select options remain exactly same.
    const form = document.getElementById('contactForm');
    const btn = document.getElementById('submitBtn');
    const success = document.getElementById('successMessage');

    // Ensure that all required inputs have placeholder for floating effect without changing displayed content
    // This is just a style-enhancer, does not alter visible label text
    const allInputs = document.querySelectorAll('.input-group input, .input-group textarea');
    allInputs.forEach(input => {
        if (!input.hasAttribute('placeholder')) {
            input.setAttribute('placeholder', ' ');
        }
    });
    // also for select, no placeholder but valid state works

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        btn.innerText = "അയക്കുന്നു...";
        btn.disabled = true;

        const data = new FormData(form);

        try {
            const res = await fetch("https://formspree.io/f/xkokqang", {
                method: "POST",
                body: data,
                headers: { 'Accept': 'application/json' }
            });

            if (res.ok) {
                form.reset();
                // after reset, manually clear any floating label leftovers? but fine
                // Re-add invisible placeholder to maintain floating style
                allInputs.forEach(input => {
                    if (input.type !== 'select-one') {
                        input.setAttribute('placeholder', ' ');
                    }
                });
                // reset select to hidden placeholder
                const selectEl = document.querySelector('select[name="subject"]');
                if (selectEl) selectEl.value = '';
                success.style.display = "block";
                setTimeout(() => {
                    success.style.display = "none";
                }, 4500);
            } else {
                alert("പ്രശ്നം സംഭവിച്ചു. ദയവായി വീണ്ടും ശ്രമിക്കുക.");
            }
        } catch (err) {
            alert("നെറ്റ്വർക്ക് പിശക്. ഇന്റർനെറ്റ് കണക്ഷൻ പരിശോധിക്കുക.");
        } finally {
            btn.innerText = "✉️ സന്ദേശം അയയ്ക്കുക";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
