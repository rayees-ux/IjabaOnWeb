<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IjabaOnWeb - Launch</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    height: 100vh;
    font-family: 'Inter', sans-serif;

    display: flex;
    align-items: center;
    justify-content: center;

    background: linear-gradient(135deg, #2e7d32, #1b5e20);
    color: white;
}

/* Launch Box */
.launch-box {
    text-align: center;
}

.launch-title {
    font-size: 32px;
    font-weight: 700;
}

.launch-sub {
    margin: 10px 0 25px;
}

.launch-btn {
    padding: 12px 28px;
    border-radius: 30px;
    background: white;
    color: #2e7d32;
    text-decoration: none;
    font-weight: 600;
}

/* 🔥 FULLSCREEN LOADER */
.loader-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: #1b5e20;

    display: flex;
    align-items: center;
    justify-content: center;

    transform: translateY(100%);
    transition: 0.6s ease;

    z-index: 9999;
}

/* ACTIVE STATE */
.loader-screen.active {
    transform: translateY(0);
}

/* Spinner */
.loader {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(720deg); }
}

</style>
</head>

<body>

<div class="launch-box">
    <div class="launch-title">🌙 IjabaOnWeb</div>
    <div class="launch-sub">Discover Islamic Knowledge</div>

    <a href="index-new.html" class="launch-btn" id="enterBtn">
        🚀 Launch Websiteb
    </a>
</div>

<!-- 🔥 Loader -->
<div class="loader-screen" id="loaderScreen">
    <div class="loader"></div>
</div>

<script>

document.getElementById("enterBtn").addEventListener("click", function(e){
    e.preventDefault();

    // show loader
    document.getElementById("loaderScreen").classList.add("active");

    // go to next page
    setTimeout(() => {
        window.location.href = "index-new.html";
    }, 800);
});

</script>

</body>
</html>
