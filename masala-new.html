        :root {
            --masala-bg: #f8f6f2;
            --masala-card: #ffffff;
            --masala-green: #2e7d32;
            --masala-green-soft: rgba(46, 125, 50, 0.1);
            --masala-gold: #c7a025;
            --masala-text: #23313a;
            --masala-muted: #63727b;
            --masala-border: rgba(46, 125, 50, 0.14);
            --masala-shadow: 0 14px 36px rgba(46, 125, 50, 0.09);
        }

        body {
            background: var(--masala-bg);
            color: var(--masala-text);
            font-family: 'Montserrat', sans-serif;
        }

        .masala-section {
            padding: 48px 0 72px;
        }

        .masala-shell {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.99));
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 28px;
            box-shadow: var(--masala-shadow);
            padding: 36px 28px;
        }

        .masala-header {
            text-align: center;
            margin-bottom: 28px;
            border-radius: 20px;
            align-items: center;
        }

        .masala-title {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            align-items: center;
        }

        .masala-subtitle {
            color: var(--masala-white);
            font-size: 1rem;
            max-width: 760px;
            margin: 0 auto;
            line-height: 1.2;
        }

        .masala-controls {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 220px;
            gap: 16px;
            margin-bottom: 28px;
        }

        .masala-input,
        .masala-select {
            width: 100%;
            border: 1px solid var(--masala-border);
            border-radius: 16px;
            background: #fff;
            padding: 14px 16px;
            color: var(--masala-text);
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
        }

        .masala-input:focus,
        .masala-select:focus {
            border-color: rgba(46, 125, 50, 0.35);
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.12);
            transform: translateY(-1px);
        }

        .masala-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 22px;
        }

        .masala-card {
            background: var(--masala-card);
            border: 1px solid var(--masala-border);
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .masala-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 34px rgba(46, 125, 50, 0.12);
        }

        .masala-card.expanded {
            box-shadow: 0 18px 34px rgba(46, 125, 50, 0.12);
        }

        .masala-category {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(199, 160, 37, 0.13);
            color: var(--masala-green);
            font-size: 0.78rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .masala-question {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
        }

        .masala-question-main {
            flex: 1;
        }

        .masala-label {
            display: inline-block;
            color: var(--masala-green);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .masala-question-text {
            font-size: 1.02rem;
            font-weight: 700;
            line-height: 1.75;
        }

        .masala-toggle {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--masala-green-soft);
            color: var(--masala-green);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .masala-card.expanded .masala-toggle {
            transform: rotate(180deg);
            background: rgba(46, 125, 50, 0.16);
        }

        .masala-answer-wrap {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.35s ease, opacity 0.3s ease, margin-top 0.3s ease;
            margin-top: 0;
        }

        .masala-card.expanded .masala-answer-wrap {
            opacity: 1;
            margin-top: 18px;
        }

        .masala-answer {
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            padding-top: 16px;
            color: var(--masala-muted);
            font-size: 0.95rem;
            line-height: 1.95;
        }

        .masala-actions {
            margin-top: 16px;
        }

        .btn-masala {
            border: none;
            border-radius: 999px;
            padding: 10px 14px;
            background: var(--masala-green);
            color: #fff;
            font-size: 0.88rem;
            cursor: pointer;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .btn-masala:hover {
            transform: translateY(-1px);
            opacity: 0.92;
        }

        .no-results {
            display: none;
            text-align: center;
            color: var(--masala-muted);
            padding: 32px 12px 0;
        }

        .fade-in {
            animation: fadeIn 0.45s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 991.98px) {
            .masala-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 767.98px) {
            .masala-section {
                padding: 32px 0 56px;

            .masala-shell {
                padding: 26px 18px;

            }

            .masala-title {

            }

            .masala-controls {
                grid-template-columns: 1fr;
            }

            .masala-grid {
                grid-template-columns: 1fr;
            }
        }

        let currentSearchQuery = "";
        let currentCategory = "all";

        // Read category from URL parameter on page load
        function getUrlCategory() {
            const params = new URLSearchParams(window.location.search);
            const categoryParam = params.get('category');
            console.log('URL Category Parameter:', categoryParam);
            return categoryParam ? categoryParam.toLowerCase() : 'all';
        }

        function categoryLabel(category) {
            const labels = {
                marriage: "നിക്കാഹ്",
                prayer: "പ്രാർത്ഥന",
                fasting: "നോമ്പ്",
                zakath: "സകാത്ത്",
                hajj: "ഹജ്ജ്",
                ibadah: "ഇബാദാഹ്",
                family: "കുടുംബം",
                business: "വ്യവസായം",
                modern: "സമീപകാലം"
            };

            return labels[category.toLowerCase()] || category;
        }

function createMasalaCard(masala, index) {
    return `
        <article class="masala-card fade-in" data-index="${index}">
            
            <div class="masala-category">${categoryLabel(masala.category)}</div>

            <div class="masala-question" tabindex="0" role="button">
                <div class="masala-question-main">
                    <span class="masala-label">ചോദ്യം</span>
                    <div class="masala-question-text">${masala.question}</div>
                </div>
                <span class="masala-toggle"><i class="fas fa-chevron-down"></i></span>
            </div>

            <div class="masala-answer-wrap" id="answer-${index}">
                
                <div class="masala-answer">
                    <span class="masala-label">ഉത്തരം</span>
                    <div>${Array.isArray(masala.answer) ? masala.answer.join('<br>') : masala.answer}</div>

            </div>

            <div class="masala-actions">
                <button class="btn-masala" type="button" onclick='copyToClipboard(${JSON.stringify(masala.answer)})'>
                    പകർത്തുക
                </button>
            </div>

        </article>
    `;
}

        function filterMasalas(query = currentSearchQuery, category = currentCategory) {
            let filtered = masalaData;

            // Normalize category to lowercase for consistent comparison
            const normalizedCategory = category.toLowerCase();

            if (normalizedCategory !== "all") {
                filtered = filtered.filter((masala) => masala.category.toLowerCase() === normalizedCategory);
            }

            if (query.trim()) {
                const lowerQuery = query.toLowerCase();
                filtered = filtered.filter((masala) => {
                    const answerText = Array.isArray(masala.answer) 
                        ? masala.answer.join(' ') 
                        : masala.answer;
                    return masala.question.toLowerCase().includes(lowerQuery) ||
                           answerText.toLowerCase().includes(lowerQuery);
                });
            }

            return filtered;
        }

        function renderMasalaCards() {
            const grid = document.getElementById("masalaGrid");
            const noResults = document.getElementById("noResults");
            const filtered = filterMasalas();

            if (!filtered.length) {
                grid.innerHTML = "";
                noResults.style.display = "block";
                return;
            }

            grid.innerHTML = filtered.map((masala, index) => createMasalaCard(masala, index)).join("");
            noResults.style.display = "none";
        }

        function toggleAnswer(card) {
            const answerWrap = card.querySelector(".masala-answer-wrap");
            const trigger = card.querySelector(".masala-question");
            const isExpanded = card.classList.toggle("expanded");

            trigger.setAttribute("aria-expanded", isExpanded ? "true" : "false");
            answerWrap.style.maxHeight = isExpanded ? `${answerWrap.scrollHeight}px` : "0px";
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("ഉത്തരം പകർത്തി! 📋");
            }).catch(() => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("copy");
                document.body.removeChild(textArea);
                alert("ഉത്തരം പകർത്തി! 📋");
            });
        }

        document.addEventListener("DOMContentLoaded", function () {
            const searchInput = document.getElementById("masalaSearch");
            const categoryFilter = document.getElementById("categoryFilter");

            // Set category from URL on page load
            currentCategory = getUrlCategory();
            categoryFilter.value = currentCategory;
            console.log('Category filter set to:', currentCategory);

            renderMasalaCards();

            searchInput.addEventListener("input", function () {
                currentSearchQuery = this.value;
                renderMasalaCards();
            });

            categoryFilter.addEventListener("change", function () {
                currentCategory = this.value;
                renderMasalaCards();
            });

            document.addEventListener("click", function (event) {
                const question = event.target.closest(".masala-question");
                if (!question) return;
                toggleAnswer(question.closest(".masala-card"));
            });

            document.addEventListener("keydown", function (event) {
                const question = event.target.closest(".masala-question");
                if (!question) return;
                if (event.key !== "Enter" && event.key !== " ") return;

                event.preventDefault();
                toggleAnswer(question.closest(".masala-card"));
            });
        });

        // Navbar toggle for mobile
        const navbarToggle = document.getElementById('navbarToggle');
        const navbarNav = document.getElementById('navbarNav');

        navbarToggle?.addEventListener('click', () => {
            navbarNav.classList.toggle('active');
        });

        // Close mobile menu when clicking a link
        document.querySelectorAll('.navbar-nav a').forEach(link => {
            link.addEventListener('click', () => {
                navbarNav.classList.remove('active');
            });
        });

        // Close mobile menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!navbarToggle.contains(e.target) && !navbarNav.contains(e.target)) {
                navbarNav.classList.remove('active');
            }
        });
