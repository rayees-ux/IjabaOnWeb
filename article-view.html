    title:"സ്ത്രീ ചേലാകർമ്മം ഇസ്ലാമിൽ ഉണ്ടോ? അതിനെക്കുറിച്ച് പ്രമാണങ്ങളും പണ്ഡിതന്മാരും എന്താണ് പറയുന്നത്?",
    content:`സ്ത്രീ ചേലാകർമ്മം എന്ന വിഷയം ഇസ്ലാമിൽ ഏറെ ചര്‍ച്ച ചെയ്യപ്പെടുന്ന ഒരു
             കാര്യമാണേ. ഇത് കുറിച്ച് ഹദീസ് ഗ്രന്ഥങ്ങളിലും ഫിഖ്ഹ് കിതാബുകളിലും 
             പരാമർശങ്ങൾ ഉണ്ടെന്ന് കാണാം. പക്ഷേ ഇതിന്റെ വിധി എന്താണെന്ന കാര്യത്തിൽ 
             എല്ലാവരും ഒരേ പോലെ പറയുന്നില്ല — ഇതാണ് പ്രധാനമായി മനസ്സിലാക്കേണ്ടത്.

            ഹദീസുകളിൽ നബി ﷺ സ്ത്രീ ചേലാകർമ്മത്തെക്കുറിച്ച് പറഞ്ഞതായി വരുന്ന ഒരു 
            നിർദ്ദേശം “അധികം ചെയ്യരുത്” എന്നതാണ്. ഇതിൽ നിന്ന് മനസിലാകുന്നത്, എന്തെങ്കിലും
            രീതിയിൽ ഇത് ചെയ്താലും അതിൽ അതിക്രമം പാടില്ല എന്നതാണ്. ശരീരത്തിന് ദോഷം 
            വരരുത്, ഹാനി ഉണ്ടാകരുത് എന്നതാണ് ഇതിന്റെ പ്രധാന ഉദ്ദേശം.

            ഇബ്നു അബ്ബാസ് (റ) പോലുള്ള സഹാബിമാർ വഴി വന്ന റിപ്പോർട്ടുകളിലും സ്ത്രീ 
            ചേലാകർമ്മത്തെക്കുറിച്ച് പരാമർശം കാണാം. ഇതിലൂടെ, ഇത് ഒരു പഴയകാല practice 
            ആയിരുന്നുവെന്ന് മനസിലാക്കാം. കൂടാതെ “ഫിത്റ” എന്ന ഹദീസിലും ചേലാകർമ്മം 
            ഉൾപ്പെടുത്തിയിട്ടുണ്ട്. എന്നാൽ ആണുങ്ങൾക്ക് ഇത് വ്യക്തമായ നിർദ്ദേശമായിട്ടുള്ളപ്പോൾ, 
            സ്ത്രീകളുടെ കാര്യത്തിൽ അത്ര വ്യക്തത ഇല്ലാത്തതിനാൽ പണ്ഡിതന്മാർ അതിനെ വിശദീകരിച്ചു.

            ഫിഖ്ഹ് പണ്ഡിതന്മാർ ഈ വിഷയത്തിൽ വ്യത്യസ്ത അഭിപ്രായങ്ങൾ പറഞ്ഞിട്ടുണ്ട്. ചിലർ സ്ത്രീ 
            ചേലാകർമ്മം നിർബന്ധമാണെന്ന് അഭിപ്രായപ്പെടുമ്പോൾ, മറ്റുചിലർ അത് സുന്നത്ത് മാത്രമാണെന്ന് 
            പറയുന്നു. മറ്റൊരു വിഭാഗം ഇത് നിർബന്ധമല്ലെന്നും, നിർബന്ധമായി ചെയ്യേണ്ട കാര്യമല്ലെന്നും 
            പറയുന്നു. അതിനാൽ, ഇത് ഒരു ഏകദേശമായ വിധിയുള്ള വിഷയം അല്ല എന്ന് മനസിലാക്കാം.

            ഫിഖ്ഹ് ഗ്രന്ഥങ്ങളിൽ പ്രത്യേകം പറഞ്ഞിട്ടുള്ള കാര്യം — ഇത് ചെയ്യുമ്പോൾ ശരീരത്തിന് ഹാനി 
            വരരുത് എന്നതാണ്. “കുറച്ച് മാത്രം ചെയ്യുക” എന്ന ഹദീസ് നിർദ്ദേശം ഇതിന് അടിസ്ഥാനമായി 
            എടുത്തിരിക്കുന്നു. അതിനാൽ, അതിക്രമമായോ ദോഷം ഉണ്ടാക്കുന്ന രീതിയിലോ ഇത് ചെയ്യുന്നത് 
            ഇസ്ലാമിക രീതിക്ക് വിരുദ്ധമാണ്.

            സിംപിൾ ആയി പറഞ്ഞാൽ, സ്ത്രീ ചേലാകർമ്മം ഇസ്ലാമിൽ പരാമർശമുള്ള കാര്യമാണെങ്കിലും, 
            അത് എല്ലാവർക്കും നിർബന്ധമായ ഒരു കര്‍മ്മമെന്ന് പറയാൻ കഴിയില്ല. മറിച്ച്, ഇത് സംബന്ധിച്ച് 
            പണ്ഡിതന്മാർ തമ്മിൽ വ്യത്യസ്ത അഭിപ്രായങ്ങൾ നിലനിൽക്കുന്നു. അതിനാൽ, ഈ വിഷയത്തിൽ 
            ഏറ്റവും പ്രധാനമായി ശ്രദ്ധിക്കേണ്ടത് — ഹാനി ഒഴിവാക്കുക, മിതത്വം പാലിക്കുക എന്നതാണ്.
    `},
8:{
 title:"ഹജ്ജ് നിർവഹിക്കുന്ന സമയത്ത് ആരോഗ്യപ്രശ്നം മൂലം തല വടിക്കാന്‍ കഴിയാത്തവർക്ക് എന്ത് ചെയ്യണം? ഖുർആൻ നൽകുന്ന നിയമപരമായ മാർഗ്ഗനിർദ്ദേശം എന്താണ്?",
 content:`ഹജ്ജ് ഒരു ആത്മീയ യാത്ര മാത്രം അല്ല; അത് നന്നായി ക്രമപ്പെടുത്തിയ ചില നിര്‍ദ്ദിഷ്ട കര്‍മ്മങ്ങളുടെയും നിയമങ്ങളുടെയും ഒരു കൂട്ടായ്മയാണ്. ഈ കര്‍മ്മങ്ങളില്‍ പ്രധാനപ്പെട്ട ഒന്നാണ് ഹജ്ജിന്റെ അവസാന ഘട്ടത്തില്‍ തല വടിക്കല്‍ (ഹല്‍ഖ്) അല്ലെങ്കില്‍ മുടി കുറയ്ക്കല്‍ (തക്സീര്‍). ഇത് പുറത്ത് കാണുന്ന ഒരു പ്രവൃത്തിയാണെങ്കിലും, അതിന്റെ ഉള്ളില്‍ വലിയൊരു സമര്‍പ്പണത്തിന്റെ അര്‍ത്ഥമുണ്ട് — മനുഷ്യന്‍ തന്റെ സ്വാഭാവിക അഭിമാനങ്ങള്‍ പോലും വിട്ട്, ദൈവത്തിന് മുന്നില്‍ വിനീതനായി നില്‍ക്കുന്ന ഒരു ഘട്ടം. പക്ഷേ ജീവിതം എല്ലായ്പ്പോഴും ഒരേ രീതിയില്‍ പോകുന്നില്ല; ചില സമയങ്ങളില്‍ രോഗം, പരിക്ക്, അല്ലെങ്കില്‍ മറ്റ് ശാരീരിക ബുദ്ധിമുട്ടുകള്‍ കാരണം തല വടിക്കല്‍ എളുപ്പമാവാതിരിക്കും. അപ്പോള്‍ ഹജ്ജിന്റെ ഈ കര്‍മ്മം എങ്ങനെ പൂര്‍ത്തിയാക്കാം എന്നതാണ് ചോദ്യം, ഇതിന് ഖുർആൻ വളരെ വ്യക്തമായി ഒരു അടിസ്ഥാന നിയമപരമായ തത്വം മുന്നോട്ടുവയ്ക്കുന്നു — ബാധ്യതയും സൗകര്യവും തമ്മിലുള്ള ഒരു സമതുലനം.

📖 Qur'an — സൂറത്ത് അൽ-ബഖറ (2:196) ല്‍ പറയുന്നത്, ഒരാള്‍ക്ക് തല വടിക്കാന്‍ ബുദ്ധിമുട്ട് ഉണ്ടെങ്കില്‍ അതിന് പകരമായി നോമ്പോ, ദാനമോ, ബലിയോ നല്‍കാമെന്നാണ്. ഇതില്‍ നിന്ന് മനസ്സിലാകുന്നത്, ഒരു കര്‍മ്മം നിര്‍ബന്ധമായിരുന്നാലും അത് നിര്‍വഹിക്കാന്‍ കഴിയാത്ത അവസ്ഥയില്‍ പകരം മാര്‍ഗ്ഗങ്ങള്‍ അനുവദിച്ചിരിക്കുന്നു എന്നതാണ്. അതായത് കര്‍ത്തവ്യം നിലനില്‍ക്കുമ്പോഴും മനുഷ്യന്റെ അസാധ്യത കണക്കിലെടുക്കപ്പെടുന്നു, പിന്നെ അതിന് ഒരു പരിഹാരവും കാണിച്ചു തരപ്പെടുന്നു. തല വടിക്കാന്‍ കഴിയാത്ത ഒരാള്‍ക്ക് നോമ്പ് നോല്‍ക്കുക, ദാനം നല്‍കുക, അല്ലെങ്കില്‍ ബലി നല്‍കുക എന്ന മൂന്ന് വഴികളില്‍ ഏതെങ്കിലും ഒന്ന് സ്വീകരിക്കാം, ഇതിലൂടെ ആ കര്‍മ്മത്തിന്റെ ആത്മീയ അര്‍ത്ഥം നിലനിര്‍ത്തപ്പെടുന്നു.

ഇതിലൂടെ ഒരു വലിയ സന്ദേശം വ്യക്തമാണ്: ഇസ്ലാമിക നിയമം വെറും കഠിനമായ നിര്‍ദ്ദേശങ്ങളുടെ കൂട്ടമല്ല; അത് മനുഷ്യന്റെ അവസ്ഥ മനസ്സിലാക്കുന്ന, കരുണയും യാഥാര്‍ത്ഥ്യബോധവും ഉള്‍ക്കൊള്ളുന്ന ഒരു സമഗ്ര സംവിധാനം തന്നെയാണ്. അതുകൊണ്ട് ഹജ്ജില്‍ തല വടിക്കാന്‍ കഴിയാത്തത് ഒരു തടസ്സമായി കാണേണ്ടതില്ല; ഖുർആൻ തന്നെയാണ് അതിന് വഴികള്‍ തുറന്നിട്ടിരിക്കുന്നത്, ഒരാള്‍ക്ക് കഴിയുന്ന രീതിയില്‍ ആ ആരാധന പൂര്‍ത്തിയാക്കാന്‍ സഹായിക്കുന്ന രീതിയില്‍.
 `},
9:{
    title:"IVF (In Vitro Fertilization) എന്ന ചികിത്സാ രീതിയെക്കുറിച്ച് ഇസ്ലാമിക ദൃഷ്ടികോണം എന്താണ്?",
    content:`IVF എന്ന വിഷയത്തെ ഇസ്ലാമിക ചിന്തയിൽ നോക്കുമ്പോൾ ആദ്യം മനസ്സിലാക്കേണ്ടത്, ജീവൻ സൃഷ്ടിക്കുന്ന അധികാരം മുഴുവനായും അല്ലാഹുവിനാണെന്ന അടിസ്ഥാന സത്യമാണ്. ഖുർആൻ പലവട്ടം മനുഷ്യനെ ഓർമ്മിപ്പിക്കുന്നതു, “അല്ലാഹു ഇച്ഛിക്കുന്നവർക്കു മക്കളെ നൽകുന്നു, ഇച്ഛിക്കുന്നവരെ പരീക്ഷിക്കുന്നു” എന്നൊരു ദൈവിക നിയന്ത്രണമാണ്. എന്നാൽ അതിനൊപ്പം തന്നെ, രോഗങ്ങൾക്ക് ചികിത്സ തേടുന്നത് തെറ്റല്ലെന്നും, മനുഷ്യൻ തന്റെ കഴിവുകൾ ഉപയോഗിച്ച് പരിഹാരം അന്വേഷിക്കണമെന്നും ഇസ്ലാം പ്രോത്സാഹിപ്പിക്കുന്നു. അങ്ങനെ നോക്കുമ്പോൾ IVF ഒരു ചികിത്സാരൂപത്തിൽ പരിഗണിക്കപ്പെടുന്നു, അതിനെ പൂർണ്ണമായും തള്ളിക്കളയുന്ന സമീപനം ഇസ്ലാമിൽ ഇല്ല.

പക്ഷേ, ഇത് ഒന്ന് നേരെ പറഞ്ഞാൽ — “വഴി ശരിയാണെങ്കിലും അതിന്റെ പരിധി കടക്കാൻ പാടില്ല” എന്ന ലൈനിലാണ് ഇസ്ലാമിന്റെ നിലപാട്. IVF നടത്തുമ്പോൾ ഭർത്താവിന്റെയും ഭാര്യയുടെയും സ്വന്തം സ്പേം, എഗ് എന്നിവ മാത്രമേ ഉപയോഗിക്കാവൂ. ഇടയ്ക്ക് വേറൊരു വ്യക്തിയുടെ സഹായം — sperm donor ആകട്ടെ, egg donor ആകട്ടെ, അല്ലെങ്കിൽ surrogate mother ആകട്ടെ — ഇതൊന്നും വരാൻ പാടില്ല. കാരണം ഇസ്ലാമിൽ വംശപരമ്പരയും ബന്ധത്തിന്റെ വ്യക്തതയും അതീവ ഗൗരവത്തോടെ കാണുന്ന ഒന്നാണ്. “കുട്ടി ആരുടെതാണ്” എന്നത് ഒരു സംശയവുമില്ലാതെ വ്യക്തമായിരിക്കണം; അതിൽ കുഴപ്പം വരുന്നത് വലിയ നൈതിക പ്രശ്നമായി കണക്കാക്കപ്പെടുന്നു.

കണ്ണൂർ ഭാഗത്തെ ഭാഷയിൽ പറഞ്ഞാൽ, “സ്വന്തം വീട്ടിലെ കാര്യം സ്വന്തം വഴിയിലൂടെ ശരിയാക്കാം, പക്ഷേ പുറത്തുകാരെ ഇടയിൽ കയറ്റണ്ട” എന്നൊരു ഫീലിലാണ് ഇത്. അതുകൊണ്ട് തന്നെ, ഭർത്താവും ഭാര്യയും തമ്മിലുള്ള ബന്ധത്തിനുള്ളിൽ തന്നെ IVF നടക്കുന്നത് പലരും അനുവദനീയമായി കാണുന്നു. എന്നാൽ അതിനകത്തും ചില ചിന്തകൾ ഉണ്ടാകുന്നുണ്ട് — ഉദാഹരണത്തിന്, ഉപയോഗിക്കാതെ ശേഷിക്കുന്ന embryos എന്ത് ചെയ്യണം, അവ നശിപ്പിക്കുന്നത് ശരിയാണോ, എന്നിങ്ങനെ. ഇതൊക്കെ ഇസ്ലാമിക നിയമശാസ്ത്രത്തിൽ ഇപ്പോഴും ചര്‍ച്ചയിലുള്ള വിഷയങ്ങളാണ്. ഒടുവിൽ പറയുമ്പോൾ, IVF ഒരു ലളിതമായ “ശരി” അല്ലെങ്കിൽ “തെറ്റ്” എന്ന വിധിയിൽ ഒതുങ്ങുന്ന കാര്യമല്ല; മറിച്ച് അത് ദൈവിക നിയന്ത്രണവും മനുഷ്യന്റെ പരിശ്രമവും തമ്മിൽ ഒരു തുലനം പാലിക്കേണ്ട, സൂക്ഷ്മമായ ഒരു വിഷയമാണ്.`}
